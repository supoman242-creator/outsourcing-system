<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 출하검사 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-black text-indigo-950 mb-8 text-center italic">SHIPMENT SYSTEM</h1>
        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-xs font-black text-indigo-500 mb-2 uppercase">User ID</label>
                <input type="text" id="uid" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 font-bold">
            </div>
            <div>
                <label class="block text-xs font-black text-indigo-500 mb-2 uppercase">Password</label>
                <input type="password" id="upw" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 font-bold">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-lg hover:bg-indigo-700 transition-all">SIGN IN</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const idValue = document.getElementById('uid').value;
            const pwValue = document.getElementById('upw').value;

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: idValue, pw: pwValue })
            });

            if (response.ok) {
                location.href = '/';
            } else {
                alert('로그인 정보가 올바르지 않습니다.');
            }
        });
    </script>
</body>
</html>
