<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - SHIPMENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm">
        <h1 class="text-3xl font-black text-indigo-600 mb-8 text-center italic">PSK SYSTEM</h1>
        <form id="login-form" class="space-y-6">
            <input type="text" id="uid" placeholder="아이디" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:border-indigo-500 font-bold">
            <input type="password" id="upw" placeholder="비밀번호" required class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:border-indigo-500 font-bold">
            <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-lg">SIGN IN</button>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: document.getElementById('uid').value, pw: document.getElementById('upw').value })
            });
            if (response.ok) location.href = '/';
            else alert('로그인 실패');
        });
    </script>
</body>
</html>
