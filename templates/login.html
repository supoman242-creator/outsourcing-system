<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 출하검사 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-violet-50 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border-2 border-violet-100">
        <h1 class="text-3xl font-black text-violet-950 mb-8 italic text-center">SHIPMENT SYSTEM</h1>
        <form action="/login" method="post" class="space-y-6">
            <div>
                <label class="block text-xs font-black text-violet-700 uppercase mb-2">Username</label>
                <input type="text" name="username" required class="w-full p-4 bg-violet-50 border-2 border-violet-100 rounded-2xl outline-none focus:border-violet-500" placeholder="아이디 입력">
            </div>
            <div>
                <label class="block text-xs font-black text-violet-700 uppercase mb-2">Password</label>
                <input type="password" name="password" required class="w-full p-4 bg-violet-50 border-2 border-violet-100 rounded-2xl outline-none focus:border-violet-500" placeholder="비밀번호 입력">
            </div>
            <button type="submit" class="w-full bg-violet-700 text-white py-5 rounded-2xl font-black text-lg shadow-lg hover:bg-violet-800 transition-all">SIGN IN</button>
        </form>
    </div>
</body>
</html>
