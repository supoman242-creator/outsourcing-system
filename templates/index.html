<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>출하검사 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-6xl mx-auto bg-white p-8 rounded-lg shadow-md">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">출하검사 시스템</h1>
            <div class="flex items-center gap-4">
                <div class="flex items-center border p-2 rounded">
                    <span class="text-sm font-bold mr-2 text-blue-600">SCHEDULE FILTER:</span>
                    <select id="filter-date" class="text-sm outline-none">
                        <option value="today">오늘 (Today)</option>
                        <option value="all" selected>전체보기 (All)</option>
                    </select>
                </div>
                <button onclick="location.href='/api/logout'" class="bg-red-500 text-white px-4 py-2 rounded text-sm">로그아웃</button>
            </div>
        </div>

        <textarea id="excel-data" class="w-full h-32 border p-4 mb-4 rounded" placeholder="엑셀 데이터를 붙여넣으세요..."></textarea>
        <div class="flex justify-between items-center mb-10">
            <span id="row-count" class="text-sm text-gray-500">0건 감지됨</span>
            <button onclick="uploadData()" class="bg-blue-600 text-white px-6 py-2 rounded font-bold">리스트 등록</button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-t">
                <thead>
                    <tr class="bg-gray-50 text-xs uppercase text-gray-600">
                        <th class="p-3 border-b">상태</th>
                        <th class="p-3 border-b">LOT</th>
                        <th class="p-3 border-b">W/O</th>
                        <th class="p-3 border-b">고객사</th>
                        <th class="p-3 border-b">MODEL</th>
                        <th class="p-3 border-b">요청일시</th>
                        <th class="p-3 border-b">QM 피드백</th>
                        <th class="p-3 border-b">관리</th>
                    </tr>
                </thead>
                <tbody id="data-table" class="text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let rawData = [];

        // 페이지 로드 시 바로 데이터 가져오기
        window.onload = function() {
            loadList();
            
            // 필터 변경 시 즉시 반영
            document.getElementById('filter-date').addEventListener('change', renderTable);

            // 입력 건수 표시
            document.getElementById('excel-data').addEventListener('input', function(e) {
                const lines = e.target.value.trim().split('\n').filter(l => l.length > 0);
                document.getElementById('row-count').innerText = lines.length + "건 감지됨";
            });
        };

        async function loadList() {
            const res = await fetch('/api/requests');
            rawData = await res.json();
            renderTable();
        }

        function renderTable() {
            const filter = document.getElementById('filter-date').value;
            const tbody = document.getElementById('data-table');
            
            let displayData = rawData;

            // '오늘' 필터가 선택된 경우에만 필터링 진행
            if (filter === 'today') {
                const today = new Date();
                const m = String(today.getMonth() + 1).padStart(2, '0');
                const d = String(today.getDate()).padStart(2, '0');
                const todayStr = `${m}월 ${d}일`;
                displayData = rawData.filter(item => item.req_date && item.req_date.includes(todayStr));
            }

            tbody.innerHTML = displayData.map(item => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3 font-bold ${item.status === '검사 완료' ? 'text-green-600' : 'text-orange-500'}">${item.status}</td>
                    <td class="p-3">${item.lot || ''}</td>
                    <td class="p-3 text-xs text-gray-500">${item.wo || ''}</td>
                    <td class="p-3">${item.cus || ''}</td>
                    <td class="p-3 font-semibold">${item.model || ''}</td>
                    <td class="p-3 text-xs">${item.req_date} ${item.req_time}</td>
                    <td class="p-3 text-xs text-red-500">${item.qm_pic || ''} ${item.reject_reason || ''}</td>
                    <td class="p-3">
                        <button onclick="deleteItem(${item.id})" class="text-gray-400 hover:text-red-500">삭제</button>
                    </td>
                </tr>
            `).join('');
        }

        async function uploadData() {
            const text = document.getElementById('excel-data').value.trim();
            if(!text) return;

            const rows = text.split('\n').map(line => {
                const c = line.split(/\t| {2,}/);
                return {
                    lot: c[0], code: c[1], wo: c[2], sn: c[3],
                    cus: c[4], line: c[5], model: c[6], module: c[7],
                    tuning_loc: c[8], tuning_bp: c[9], mfg_pic: c[10],
                    req_date: c[11], req_time: c[12]
                };
            });

            const res = await fetch('/api/requests/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(rows)
            });

            if(res.ok) {
                document.getElementById('excel-data').value = '';
                loadList();
                alert("등록되었습니다.");
            }
        }

        async function deleteItem(id) {
            if(!confirm("삭제하시겠습니까?")) return;
            await fetch('/api/requests/' + id + '/delete', {method: 'POST'});
            loadList();
        }
    </script>
</body>
</html>
