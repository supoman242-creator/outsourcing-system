<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출하검사 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8faff; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl font-extrabold text-indigo-900 italic">출하검사 시스템</h1>
            <div class="flex items-center gap-4">
                <div class="flex items-center bg-white border rounded-lg px-3 py-2 shadow-sm">
                    <span class="text-xs font-bold text-indigo-600 mr-2">SCHEDULE FILTER:</span>
                    <select id="schedule-filter" class="text-sm outline-none bg-transparent font-semibold">
                        <option value="today">오늘 (Today)</option>
                        <option value="all" selected>전체보기 (All)</option> </select>
                </div>
                <button onclick="location.href='/api/logout'" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700 transition">로그아웃</button>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 shadow-xl mb-8 border-t-4 border-t-indigo-500">
            <div class="flex gap-4 mb-4">
                <button onclick="showTab('all')" id="btn-tab-all" class="px-6 py-2 rounded-xl font-bold bg-indigo-600 text-white shadow-lg">전체 리스트</button>
                <button onclick="showTab('pending')" id="btn-tab-pending" class="px-6 py-2 rounded-xl font-bold bg-white text-slate-600 border hover:bg-slate-50">QM 피드백 대기</button>
            </div>
            
            <textarea id="excel-input" rows="4" class="w-full p-4 border-2 border-dashed border-indigo-200 rounded-xl focus:border-indigo-500 outline-none transition mb-4 bg-indigo-50/30" placeholder="엑셀 데이터를 복사해서 여기에 붙여넣으세요..."></textarea>
            
            <div class="flex justify-between items-center">
                <span id="detect-count" class="text-sm font-bold text-indigo-600">0건 감지됨</span>
                <button onclick="syncData()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg transform active:scale-95 transition">리스트 등록</button>
            </div>
        </div>

        <div class="glass-card rounded-2xl shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                            <th class="p-4 border-b">상태</th>
                            <th class="p-4 border-b">LOT</th>
                            <th class="p-4 border-b">W/O</th>
                            <th class="p-4 border-b">고객사</th>
                            <th class="p-4 border-b">Model</th>
                            <th class="p-4 border-b">MFG</th>
                            <th class="p-4 border-b">요청일시</th>
                            <th class="p-4 border-b">QM담당/사유</th>
                            <th class="p-4 border-b text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody id="request-table" class="text-sm text-slate-700 divide-y">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let currentTab = 'all';

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            
            // 필터 변경 시 리렌더링
            document.getElementById('schedule-filter').addEventListener('change', renderTable);
            
            // 엑셀 입력 감지
            document.getElementById('excel-input').addEventListener('input', (e) => {
                const lines = e.target.value.trim().split('\n').filter(l => l.length > 0);
                document.getElementById('detect-count').innerText = `${lines.length}건 감지됨`;
            });
        });

        async function fetchData() {
            const res = await fetch('/api/requests');
            allData = await res.json();
            renderTable();
        }

        function renderTable() {
            const filter = document.getElementById('schedule-filter').value;
            const container = document.getElementById('request-table');
            const todayStr = new Date().toLocaleDateString('ko-KR', { month: '02d', day: '02d' }).replace(/\. /g, '월 ').replace('.', '일'); 
            // 실제 날짜 비교 로직은 데이터 포맷에 따라 조정 필요 (현재는 전체보기가 기본)

            let filtered = allData;
            
            // 탭 필터링
            if(currentTab === 'pending') {
                filtered = filtered.filter(d => d.status === '검사 요청');
            }

            // 날짜 필터링 (간단 구현)
            if(filter === 'today') {
                const now = new Date();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const searchStr = `${m}월 ${d}일`;
                filtered = filtered.filter(item => item.req_date && item.req_date.includes(searchStr));
            }

            container.innerHTML = filtered.map(item => `
                <tr class="hover:bg-indigo-50/50 transition">
                    <td class="p-4">
                        <span class="status-badge ${item.status === '검사 완료' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                            ${item.status}
                        </span>
                    </td>
                    <td class="p-4 font-semibold">${item.lot || '-'}</td>
                    <td class="p-4 text-xs">${item.wo || '-'}</td>
                    <td class="p-4">${item.cus || '-'}</td>
                    <td class="p-4 font-medium text-indigo-600">${item.model || '-'}</td>
                    <td class="p-4">${item.mfg_pic || '-'}</td>
                    <td class="p-4 text-xs text-slate-500">${item.req_date} ${item.req_time}</td>
                    <td class="p-4 text-xs">${item.qm_pic || '-'} ${item.reject_reason ? `<br><span class="text-red-500">${item.reject_reason}</span>` : ''}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteItem(${item.id})" class="text-slate-300 hover:text-red-500 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function syncData() {
            const input = document.getElementById('excel-input').value.trim();
            if(!input) return alert("데이터를 입력하세요.");

            const rows = input.split('\n').map(line => {
                const cols = line.split(/\t| {2,}/);
                return {
                    lot: cols[0], code: cols[1], wo: cols[2], sn: cols[3],
                    cus: cols[4], line: cols[5], model: cols[6], module: cols[7],
                    tuning_loc: cols[8], tuning_bp: cols[9], mfg_pic: cols[10],
                    req_date: cols[11], req_time: cols[12]
                };
            });

            const res = await fetch('/api/requests/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(rows)
            });

            if(res.ok) {
                document.getElementById('excel-input').value = '';
                fetchData();
                alert("성공적으로 등록되었습니다.");
            }
        }

        async function deleteItem(id) {
            if(!confirm("정말 삭제하시겠습니까?")) return;
            await fetch(`/api/requests/${id}/delete`, {method: 'POST'});
            fetchData();
        }

        function showTab(tab) {
            currentTab = tab;
            const btnAll = document.getElementById('btn-tab-all');
            const btnPending = document.getElementById('btn-tab-pending');
            
            if(tab === 'all') {
                btnAll.className = "px-6 py-2 rounded-xl font-bold bg-indigo-600 text-white shadow-lg";
                btnPending.className = "px-6 py-2 rounded-xl font-bold bg-white text-slate-600 border hover:bg-slate-50";
            } else {
                btnPending.className = "px-6 py-2 rounded-xl font-bold bg-indigo-600 text-white shadow-lg";
                btnAll.className = "px-6 py-2 rounded-xl font-bold bg-white text-slate-600 border hover:bg-slate-50";
            }
            renderTable();
        }
    </script>
</body>
</html>
