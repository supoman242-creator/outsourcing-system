<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>출하검사 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.025em; background-color: #f3f0ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { background-color: #5b21b6; color: white; border-bottom: 4px solid #8b5cf6; }
        th { white-space: nowrap; font-size: 11px; padding: 12px 10px; background: #fdfcff; border-bottom: 2px solid #ddd6fe; text-align: center; color: #5b21b6; }
        td { font-size: 12px; padding: 10px 10px; border-bottom: 1px solid #ede9fe; text-align: center; background: white; white-space: nowrap; }
        .filter-input { width: 100%; font-size: 10px; padding: 4px; border: 1px solid #ddd6fe; border-radius: 6px; outline: none; }
        .master-only { display: none; }
        .master-active .master-only { display: table-cell; }
        .toast-msg { position: fixed; top: 20px; right: 20px; z-index: 100; display: none; }
        .excel-container { background: white; border: 2px solid #ddd6fe; border-radius: 2rem; padding: 2rem; margin-bottom: 2.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        #excel-paste { width: 100%; height: 120px; padding: 1.25rem; border-radius: 1.5rem; border: 2px dashed #ddd6fe; background-color: #fdfcff; font-size: 13px; outline: none; }
        .reject-area { transition: all 0.4s ease; max-height: 0; overflow: hidden; opacity: 0; }
        .reject-area.open { max-height: 400px; opacity: 1; margin-top: 1rem; }
        #master-switch-wrapper { display: none; }
    </style>
</head>
<body class="p-8">
    <div id="toast" class="toast-msg bg-violet-900 text-white px-8 py-4 rounded-2xl shadow-2xl font-bold"></div>

    <div class="max-w-full mx-auto">
        <div class="flex items-center justify-between mb-10 pb-6 border-b border-violet-200">
            <h1 class="text-4xl font-black text-violet-950 italic">출하검사 시스템</h1>
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded-xl border-2 border-violet-100 flex items-center gap-2">
                    <span class="text-[10px] font-black text-violet-500">FILTER:</span>
                    <select id="date-select-box" onchange="setDateFilter(this.value)" class="text-xs font-bold outline-none">
                        <option value="all">전체 보기 (All)</option>
                        <option value="past">과거</option>
                        <option value="today">오늘</option>
                        <option value="future">예정</option>
                    </select>
                </div>
                <div id="master-switch-wrapper">
                    <button onclick="toggleMaster()" class="flex items-center gap-2 bg-white border-2 border-violet-100 px-4 py-2 rounded-xl">
                        <span class="text-[10px] font-black uppercase text-slate-400">Master</span>
                        <div id="master-dot-bg" class="w-8 h-4 bg-slate-200 rounded-full relative transition-colors">
                            <div id="master-dot" class="w-3 h-3 bg-white rounded-full absolute top-0.5 left-0.5 transition-all"></div>
                        </div>
                    </button>
                </div>
                <a href="/api/logout" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold">로그아웃</a>
            </div>
        </div>

        <div class="flex space-x-3 mb-8">
            <button onclick="changeTab('list')" id="btn-list" class="nav-btn active px-10 py-4 rounded-2xl text-sm font-black shadow-lg">전체 리스트</button>
            <button onclick="changeTab('qm')" id="btn-qm" class="nav-btn px-10 py-4 rounded-2xl text-sm font-black text-violet-900 bg-white shadow-md">
                QM 피드백 <span id="qm-count-badge" class="bg-red-500 text-white px-2 py-0.5 rounded-full text-[10px] ml-1 hidden">0</span>
            </button>
        </div>

        <div id="tab-list" class="tab-content active">
            <div class="excel-container" id="excel-input-area" style="display: none;">
                <textarea id="excel-paste" placeholder="엑셀 데이터를 붙여넣으세요..."></textarea>
                <div id="preview-area" class="hidden flex items-center justify-between mt-4 bg-violet-50 p-4 rounded-xl">
                    <span class="text-sm font-bold text-violet-700"><span id="item-count">0</span>건 감지</span>
                    <button onclick="submitSync()" class="bg-violet-600 text-white px-6 py-2 rounded-xl font-black text-sm">리스트 등록</button>
                </div>
            </div>
            
            <div class="bg-white border-2 border-violet-100 rounded-3xl shadow-sm overflow-hidden" id="table-container">
                <div class="overflow-x-auto max-h-[700px]">
                    <table class="w-full border-collapse">
                        <thead class="sticky top-0 bg-white z-10 shadow-md">
                            <tr>
                                <th>상태</th><th>LOT</th><th>W/O</th><th>S/N</th><th>고객사</th><th>Line</th>
                                <th>Model</th><th>Module</th><th>Tuning</th><th>B.P</th><th>MFG</th><th>요청일시</th><th>QM/사유</th><th class="master-only">액션</th>
                            </tr>
                            <tr class="bg-violet-50/50">
                                <th></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th class="master-only"></th>
                            </tr>
                        </thead>
                        <tbody id="list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-qm" class="tab-content">
            <div id="qm-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-7xl mx-auto"></div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-black/50 hidden z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl">
            <h2 class="text-xl font-black text-violet-950 mb-6 italic text-center underline decoration-violet-300">INFO EDIT</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-id">
                <div><label class="text-[10px] font-black text-violet-500 uppercase">Request Date</label><input type="text" id="edit-date" class="w-full p-3 bg-violet-50 border border-violet-100 rounded-xl text-sm font-bold"></div>
                <div><label class="text-[10px] font-black text-violet-500 uppercase">Request Time</label><input type="text" id="edit-time" class="w-full p-3 bg-violet-50 border border-violet-100 rounded-xl text-sm font-bold"></div>
            </div>
            <div class="flex gap-2 mt-8">
                <button onclick="submitEdit()" class="flex-1 bg-violet-700 text-white py-3 rounded-xl font-black shadow-lg">SAVE</button>
                <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-black">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let isMaster = false;
        let currentDateFilter = 'all'; 
        let currentUser = ""; 

        async function fetchData() {
            try {
                const userRes = await fetch('/api/user');
                if (!userRes.ok) { location.href = '/login'; return; }
                const userData = await userRes.json();
                currentUser = userData.username;
                
                if(currentUser === 'pskhmfg') {
                    document.getElementById('master-switch-wrapper').style.display = 'block';
                    document.getElementById('excel-input-area').style.display = 'block';
                }

                const res = await fetch('/api/requests');
                allData = await res.json();
                
                const qmWaitItems = allData.filter(i => i.status === '검사 요청');
                document.getElementById('qm-count-badge').innerText = qmWaitItems.length;
                document.getElementById('qm-count-badge').classList.toggle('hidden', qmWaitItems.length === 0);
                
                renderTable(allData);
                renderQM(qmWaitItems);
            } catch (e) { console.error("Fetch Error:", e); }
        }

        function renderTable(data) {
            const listBody = document.getElementById('list-body');
            listBody.innerHTML = data.map(i => {
                const statusColor = i.status === '확정' ? 'bg-green-100 text-green-700' : 
                                   i.status === '반려' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700';
                
                // 확정 시 사유 미노출, 반려 시에만 사유 노출
                const qmInfo = (i.status === '반려' && i.reject_reason) 
                               ? `${i.qm_pic||'-'} <span class="text-[10px] text-red-500 font-bold ml-1">[사유: ${i.reject_reason}]</span>` 
                               : (i.qm_pic || '-');

                return `
                <tr class="hover:bg-violet-50/50 transition-colors cursor-pointer" onclick="openEditModal('${i.id}', '${i.req_date}', '${i.req_time}')">
                    <td><span class="px-2 py-1 rounded-md font-black text-[10px] ${statusColor}">${i.status}</span></td>
                    <td class="font-bold text-slate-700">${i.lot}</td>
                    <td class="text-slate-500">${i.wo}</td>
                    <td class="text-indigo-600 font-black">${i.sn}</td>
                    <td class="text-[11px]">${i.cus}</td>
                    <td class="text-[11px]">${i.line}</td>
                    <td class="font-black text-left px-2">${i.model}</td>
                    <td class="font-bold text-violet-600">${i.module}</td>
                    <td class="text-slate-500">${i.tuning_loc || '-'}</td>
                    <td class="text-slate-500">${i.tuning_bp || '-'}</td>
                    <td class="text-[11px] font-medium">${i.mfg_pic}</td>
                    <td class="text-slate-400 text-[10px]">${i.req_date} ${i.req_time}</td>
                    <td class="text-violet-700 font-black text-[11px]">${qmInfo}</td>
                    <td class="master-only"><button onclick="event.stopPropagation(); deleteItem(${i.id})" class="text-red-400 font-bold">삭제</button></td>
                </tr>`;
            }).join('');
            filterTable();
        }

        function filterTable() {
            const filters = document.querySelectorAll('.filter-input');
            const rows = document.getElementById("list-body").rows;
            const today = new Date(); today.setHours(0,0,0,0);
            const todayTime = today.getTime();

            for (let i = 0; i < rows.length; i++) {
                let show = true;
                if (!allData[i]) continue;

                // 1. 날짜 필터
                const rowDate = getParsedDate(allData[i].req_date);
                if (currentDateFilter !== 'all') {
                    const rowTime = rowDate.getTime();
                    if (currentDateFilter === 'today' && rowTime !== todayTime) show = false;
                    if (currentDateFilter === 'past' && rowTime >= todayTime) show = false;
                    if (currentDateFilter === 'future' && rowTime <= todayTime) show = false;
                }

                // 2. 검색어 필터
                if (show) {
                    for(let j=0; j<filters.length; j++) {
                        const fVal = filters[j].value.toLowerCase().trim();
                        const cell = rows[i].cells[j+1];
                        if(fVal && cell && !cell.innerText.toLowerCase().includes(fVal)) { show = false; break; }
                    }
                }
                rows[i].style.display = show ? "" : "none";
            }
        }

        function getParsedDate(dStr) {
            if(!dStr) return new Date(0);
            const clean = dStr.replace(/[년월일]/g, '-').replace(/\s+/g, '');
            const parts = clean.split('-').filter(p => p !== '');
            const d = parts.length === 2 ? new Date(new Date().getFullYear(), parts[0]-1, parts[1]) : new Date(dStr);
            d.setHours(0,0,0,0); return d;
        }

        // 엑셀 파싱 및 기타 함수들... (기존 기능 유지)
        document.getElementById('excel-paste').addEventListener('input', function() {
            const rows = this.value.trim().split('\n');
            window.pastedData = rows.map(row => {
                const c = row.split('\t');
                if (c.length < 13) return null;
                return { lot: c[0], code: c[1], wo: c[2], sn: c[3], cus: c[4], line: c[5], model: c[6], module: c[7], tuning_loc: c[8], tuning_bp: c[9], mfg_pic: c[10], req_date: c[11], req_time: c[12] };
            }).filter(i => i && !i.lot.includes("LOT"));
            document.getElementById('item-count').innerText = window.pastedData.length;
            document.getElementById('preview-area').classList.toggle('hidden', window.pastedData.length === 0);
        });

        async function submitSync() {
            const res = await fetch('/api/requests/sync', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(window.pastedData) });
            if(res.ok) { document.getElementById('excel-paste').value = ''; document.getElementById('preview-area').classList.add('hidden'); fetchData(); showToast("등록 완료"); }
        }

        function setDateFilter(v) { currentDateFilter = v; filterTable(); }
        function openEditModal(id, date, time) { if(currentUser === 'pskhqm') return; document.getElementById('edit-id').value = id; document.getElementById('edit-date').value = date; document.getElementById('edit-time').value = time; document.getElementById('edit-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }
        async function submitEdit() {
            const id = document.getElementById('edit-id').value;
            const res = await fetch('/api/respond', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: parseInt(id), req_date: document.getElementById('edit-date').value, req_time: document.getElementById('edit-time').value, status: '검사 요청' }) });
            if(res.ok) { closeModal(); fetchData(); showToast("수정 완료"); }
        }

        function renderQM(qmWait) {
            const container = document.getElementById('qm-container');
            if(qmWait.length === 0) { container.innerHTML = `<div class="col-span-full py-20 text-center text-violet-300 font-bold">대기 중인 피드백이 없습니다.</div>`; return; }
            container.innerHTML = qmWait.map(i => `
                <div class="bg-white border-2 border-violet-100 rounded-[2rem] shadow-sm overflow-hidden p-6">
                    <div class="flex justify-between items-center mb-4"><span class="bg-violet-900 text-white px-3 py-1 rounded-full text-[10px] font-bold">LOT: ${i.lot}</span><span class="text-xs font-black text-violet-500">${i.req_date} ${i.req_time}</span></div>
                    <h3 class="text-xl font-black text-slate-800 mb-1">${i.model}</h3>
                    <p class="text-sm text-violet-600 font-bold mb-4">${i.module} / S/N: ${i.sn}</p>
                    <div class="grid grid-cols-2 gap-2 mb-6 text-[11px]">
                        <div class="bg-slate-50 p-2 rounded-lg"><b>Line:</b> ${i.cus} / ${i.line}</div>
                        <div class="bg-slate-50 p-2 rounded-lg"><b>MFG:</b> ${i.mfg_pic}</div>
                    </div>
                    <div class="flex gap-2">
                        <select id="qmpic-${i.id}" class="flex-1 bg-violet-50 border border-violet-100 p-3 rounded-xl text-xs font-bold outline-none">
                            <option value="">담당 선택</option><option value="김구원">김구원</option><option value="위대명">위대명</option><option value="박진주">박진주</option><option value="박현용">박현용</option>
                        </select>
                        <button onclick="respond('${i.id}')" class="bg-violet-700 text-white px-5 rounded-xl font-black text-xs shadow-md">확정</button>
                        <button onclick="toggleRejectArea('${i.id}')" class="bg-red-50 text-red-500 px-4 rounded-xl font-black text-xs border border-red-100">반려</button>
                    </div>
                    <div id="reject-area-${i.id}" class="reject-area">
                        <textarea id="reject-reason-${i.id}" class="w-full p-3 bg-red-50 border border-red-100 rounded-xl text-xs mt-3 h-20 outline-none" placeholder="반려 사유 입력..."></textarea>
                        <button onclick="submitReject('${i.id}')" class="w-full bg-red-500 text-white py-3 rounded-xl text-xs font-black mt-2">반려 제출</button>
                    </div>
                </div>`).join('');
        }

        function toggleRejectArea(id) { document.getElementById(`reject-area-${id}`).classList.toggle('open'); }
        async function submitReject(id) {
            const reason = document.getElementById(`reject-reason-${id}`).value.trim();
            if(!reason) return alert("사유 입력 필수");
            const res = await fetch('/api/respond', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: parseInt(id), status: '반려', reject_reason: reason }) });
            if(res.ok) { fetchData(); changeTab('list'); showToast("반려 처리됨"); }
        }
        async function respond(id) {
            const pic = document.getElementById(`qmpic-${id}`).value;
            if(!pic) return alert("담당자 선택 필수");
            const res = await fetch('/api/respond', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: parseInt(id), qm_pic: pic, status: '확정' }) });
            if(res.ok) { fetchData(); showToast("검사 확정"); }
        }
        async function deleteItem(id) { if(confirm("삭제하시겠습니까?")) { await fetch(`/api/requests/${id}/delete`, { method: 'POST' }); fetchData(); } }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = "✅ " + m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
        function changeTab(n) { document.querySelectorAll('.tab-content, .nav-btn').forEach(e => e.classList.remove('active')); document.getElementById('tab-'+n).classList.add('active'); document.getElementById('btn-'+n).classList.add('active'); }
        function toggleMaster() { 
            if(currentUser !== 'pskhmfg') return;
            isMaster = !isMaster; 
            document.getElementById('master-dot').style.left = isMaster ? '1.125rem' : '0.125rem'; 
            document.getElementById('master-dot-bg').classList.toggle('bg-violet-500', isMaster);
            document.getElementById('table-container').classList.toggle('master-active', isMaster); 
        }
        window.onload = fetchData;
    </script>
</body>
</html>
