<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>출하검사 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.025em; background-color: #f3f0ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { background-color: #5b21b6; color: white; border-bottom: 4px solid #8b5cf6; }
        th { white-space: nowrap; font-size: 11px; padding: 12px 6px; background: #fdfcff; border-bottom: 2px solid #ddd6fe; text-align: center; color: #5b21b6; }
        td { font-size: 12px; padding: 10px 6px; border-bottom: 1px solid #ede9fe; text-align: center; background: white; }
        .filter-input { width: 100%; font-size: 10px; padding: 4px; border: 1px solid #ddd6fe; border-radius: 6px; outline: none; }
        .date-filter-container { background: white; padding: 8px 16px; border-radius: 12px; border: 2px solid #ddd6fe; display: flex; align-items: center; gap: 10px; }
        .date-select-filter { background: #f5f3ff; border: 1px solid #8b5cf6; color: #5b21b6; font-weight: 900; font-size: 12px; padding: 4px 8px; border-radius: 8px; cursor: pointer; }
        .master-only { display: none; }
        .master-active .master-only { display: table-cell; }
        .toast-msg { position: fixed; top: 20px; right: 20px; z-index: 100; display: none; }
        .excel-container { background: white; border: 2px solid #ddd6fe; border-radius: 2rem; padding: 2rem; margin-bottom: 2.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        #excel-paste { width: 100%; height: 120px; padding: 1.25rem; border-radius: 1.5rem; border: 2px dashed #ddd6fe; background-color: #fdfcff; font-size: 13px; outline: none; }
        .info-card-label { color: #7c3aed; font-size: 11px; font-weight: 800; margin-bottom: 2px; text-transform: uppercase; }
        .info-card-value { color: #1e1b4b; font-size: 14px; font-weight: 700; }
        .reject-area { transition: all 0.4s ease; max-height: 0; overflow: hidden; opacity: 0; }
        .reject-area.open { max-height: 400px; opacity: 1; margin-top: 1rem; }
    </style>
</head>
<body class="p-8">
    <div id="toast" class="toast-msg bg-violet-900 text-white px-8 py-4 rounded-2xl shadow-2xl font-bold"></div>

    <div class="max-w-full mx-auto">
        <div class="flex items-center justify-between mb-10 pb-6 border-b border-violet-200">
            <h1 class="text-4xl font-black text-violet-950 italic">출하검사 시스템</h1>
            <div class="flex items-center gap-4">
                <div class="date-filter-container shadow-sm">
                    <span class="text-xs font-black text-violet-700 uppercase">📅 Schedule Filter:</span>
                    <select id="date-select-box" onchange="setDateFilter(this.value)" class="date-select-filter">
                        <option value="all">전체 보기 (All)</option>
                        <option value="past">과거 (Past)</option>
                        <option value="today" selected>오늘 (Today)</option>
                        <option value="future">예정 (Future)</option>
                    </select>
                </div>
                <button onclick="toggleMaster()" id="master-switch" class="flex items-center gap-3 bg-white border-2 border-violet-100 px-5 py-2 rounded-2xl shadow-sm hover:border-violet-300">
                    <span class="text-xs font-black text-slate-500 uppercase">Master Mode</span>
                    <div class="w-12 h-6 bg-slate-200 rounded-full relative"><div id="master-dot" class="w-5 h-5 bg-white rounded-full absolute top-0.5 left-0.5 shadow-md transition-all"></div></div>
                </button>
                <a href="/api/logout" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-black transition-all">로그아웃</a>
            </div>
        </div>

        <div class="flex space-x-3 mb-8">
            <button onclick="changeTab('list')" id="btn-list" class="nav-btn active px-12 py-4 rounded-2xl text-sm font-black shadow-lg">전체 리스트</button>
            <button onclick="changeTab('qm')" id="btn-qm" class="nav-btn px-12 py-4 rounded-2xl text-sm font-black text-violet-900 bg-white shadow-md">
                QM 피드백 대기 <span id="qm-count-badge" class="bg-red-500 text-white px-2 py-0.5 rounded-full text-[10px] ml-2 hidden">0</span>
            </button>
        </div>

        <div id="tab-list" class="tab-content active">
            <div class="excel-container">
                <textarea id="excel-paste" placeholder="엑셀 데이터를 붙여넣으세요..."></textarea>
                <div id="preview-area" class="hidden flex items-center justify-between bg-violet-50 p-5 rounded-2xl mt-4">
                    <span class="text-sm font-bold text-violet-700"><span id="item-count">0</span>건 감지됨</span>
                    <button onclick="submitSync()" class="bg-violet-600 text-white px-8 py-2 rounded-xl font-black text-sm">리스트 등록</button>
                </div>
            </div>
            <div class="bg-white border-2 border-violet-100 rounded-3xl overflow-hidden shadow-sm" id="table-container">
                <div class="overflow-x-auto max-h-[700px]">
                    <table class="w-full border-collapse">
                        <thead class="sticky top-0 bg-white z-10 shadow-md">
                            <tr>
                                <th>상태</th><th>LOT</th><th>W/O</th><th>S/N</th><th>고객사</th><th>Line</th>
                                <th>Model</th><th>Module</th><th>Tuning 장소</th><th>Tuning B.P</th><th>MFG</th><th>요청일시</th><th>QM담당/사유</th><th class="master-only">액션</th>
                            </tr>
                            <tr class="bg-violet-50/50">
                                <th></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()" placeholder="검색"></th>
                                <th class="master-only"></th>
                            </tr>
                        </thead>
                        <tbody id="list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-qm" class="tab-content">
            <div id="qm-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-7xl mx-auto"></div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-black/50 hidden z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-lg p-10 shadow-2xl">
            <h2 class="text-2xl font-black text-violet-950 mb-6 italic">정보 수정</h2>
            <div class="space-y-4">
                <input type="hidden" id="edit-id">
                <div><label class="info-card-label">요청일</label><input type="text" id="edit-date" class="w-full p-4 bg-violet-50 border-2 border-violet-100 rounded-xl outline-none"></div>
                <div><label class="info-card-label">시각</label><input type="text" id="edit-time" class="w-full p-4 bg-violet-50 border-2 border-violet-100 rounded-xl outline-none"></div>
            </div>
            <div class="flex gap-3 mt-10">
                <button onclick="submitEdit()" class="flex-1 bg-violet-700 text-white py-4 rounded-2xl font-black shadow-lg">완료</button>
                <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-black">취소</button>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let isMaster = false;
        let currentDateFilter = 'today';

        async function fetchData() {
            const res = await fetch('/api/requests');
            if(res.status === 401) { location.href = '/login'; return; }
            allData = await res.json();
            const qmWaitItems = allData.filter(i => i.status === '검사 요청');
            document.getElementById('qm-count-badge').innerText = qmWaitItems.length;
            document.getElementById('qm-count-badge').classList.toggle('hidden', qmWaitItems.length === 0);
            renderTable(allData);
            renderQM(qmWaitItems);
        }

        document.getElementById('excel-paste').addEventListener('input', function() {
            const rows = this.value.trim().split('\n');
            window.pastedData = rows.map(row => {
                const c = row.split('\t');
                if (c.length < 13) return null;
                return { lot: c[0], code: c[1], wo: c[2], sn: c[3], cus: c[4], line: c[5], model: c[6], module: c[7], tuning_loc: c[8], tuning_bp: c[9], mfg_pic: c[10], req_date: c[11], req_time: c[12] };
            }).filter(i => i && !i.lot.includes("LOT"));
            document.getElementById('item-count').innerText = window.pastedData.length;
            document.getElementById('preview-area').classList.toggle('hidden', window.pastedData.length === 0);
        });

        async function submitSync() {
            const res = await fetch('/api/requests/sync', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(window.pastedData) });
            if(res.ok) { document.getElementById('excel-paste').value = ''; document.getElementById('preview-area').classList.add('hidden'); fetchData(); showToast("등록 완료"); }
        }

        function setDateFilter(v) { currentDateFilter = v; filterTable(); }

        function getParsedDate(dateStr) {
            const now = new Date();
            if(!dateStr) return new Date(0);
            let cleanStr = dateStr.replace(/[년월일]/g, '-').replace(/\s+/g, '');
            const parts = cleanStr.split('-').filter(p => p !== '');
            let d;
            if (parts.length === 2) d = new Date(now.getFullYear(), parseInt(parts[0])-1, parseInt(parts[1]));
            else d = new Date(dateStr);
            d.setHours(0,0,0,0);
            return d;
        }

        function filterTable() {
            const filters = document.querySelectorAll('.filter-input');
            const rows = document.getElementById("list-body").rows;
            const today = new Date(); today.setHours(0,0,0,0);
            const todayTime = today.getTime();
            for (let i = 0; i < rows.length; i++) {
                let show = true;
                const rowDate = getParsedDate(allData[i].req_date);
                const rowTime = rowDate.getTime();
                if (currentDateFilter !== 'all') {
                    if (currentDateFilter === 'today' && rowTime !== todayTime) show = false;
                    if (currentDateFilter === 'past' && rowTime >= todayTime) show = false;
                    if (currentDateFilter === 'future' && rowTime <= todayTime) show = false;
                }
                if (show) {
                    for(let j=0; j<filters.length; j++) {
                        const fVal = filters[j].value.toLowerCase().trim();
                        const cVal = rows[i].cells[j+1].innerText.toLowerCase().trim();
                        if(fVal && !cVal.includes(fVal)) { show = false; break; }
                    }
                }
                rows[i].style.display = show ? "" : "none";
            }
        }

        function renderTable(data) {
            document.getElementById('list-body').innerHTML = data.map(i => `
                <tr class="hover:bg-violet-50/50 transition-colors cursor-pointer" onclick="openEditModal('${i.id}', '${i.req_date}', '${i.req_time}')">
                    <td><span class="px-3 py-1.5 rounded-lg font-black text-[11px] ${i.status==='확정'?'bg-green-100 text-green-700':i.status==='반려'?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700'}">${i.status}</span></td>
                    <td class="font-bold text-slate-700">${i.lot}</td>
                    <td class="text-slate-500">${i.wo}</td><td class="text-indigo-600 font-black">${i.sn}</td><td>${i.cus}</td><td>${i.line}</td>
                    <td class="font-black text-left pl-4">${i.model}</td><td class="font-bold text-violet-600">${i.module}</td>
                    <td class="text-slate-600">${i.tuning_loc || '-'}</td><td class="text-slate-600">${i.tuning_bp || '-'}</td>
                    <td class="font-medium">${i.mfg_pic}</td>
                    <td class="text-slate-500 font-medium">${i.req_date} ${i.req_time}</td>
                    <td class="text-violet-700 font-black">${i.qm_pic||'-'}${i.reject_reason?`<div class="text-[10px] text-red-500 mt-1 font-bold">[사유] ${i.reject_reason}</div>`:''}</td>
                    <td class="master-only"><button onclick="event.stopPropagation(); deleteItem(${i.id})" class="text-red-400 font-bold">삭제</button></td>
                </tr>`).join('');
            filterTable();
        }

        function openEditModal(id, date, time) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-date').value = date;
            document.getElementById('edit-time').value = time;
            document.getElementById('edit-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }
        async function submitEdit() {
            const id = document.getElementById('edit-id').value;
            const res = await fetch('/api/respond', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: parseInt(id), req_date: document.getElementById('edit-date').value, req_time: document.getElementById('edit-time').value, status: '검사 요청' })
            });
            if(res.ok) { closeModal(); fetchData(); showToast("수정 완료"); }
        }

        function renderQM(qmWait) {
            const container = document.getElementById('qm-container');
            if(qmWait.length === 0) { container.innerHTML = `<div class="col-span-full py-32 text-center text-violet-300 font-black text-2xl uppercase tracking-widest">No Pending</div>`; return; }
            container.innerHTML = qmWait.map(i => `
                <div class="bg-white border-2 border-violet-100 rounded-[2.5rem] shadow-sm overflow-hidden flex flex-col">
                    <div class="bg-violet-900 px-8 py-4 flex justify-between items-center"><span class="text-white font-black text-sm">LOT: ${i.lot}</span><span class="bg-white text-violet-900 px-3 py-1 rounded-full text-[10px] font-black uppercase">Waiting</span></div>
                    <div class="p-8 flex-1">
                        <div class="mb-6"><h3 class="text-3xl font-black text-slate-900 leading-tight">${i.model}</h3><div class="flex items-center gap-2 mt-1"><span class="text-violet-600 font-black text-lg">${i.module}</span><span class="text-slate-300">|</span><span class="text-slate-500 font-bold text-sm">S/N: ${i.sn}</span></div></div>
                        <div class="grid grid-cols-3 gap-y-6 gap-x-4 mb-8">
                            <div><p class="info-card-label">Customer / Line</p><p class="info-card-value">${i.cus} / ${i.line}</p></div>
                            <div><p class="info-card-label">Work Order</p><p class="info-card-value text-indigo-600">${i.wo}</p></div>
                            <div><p class="info-card-label">MFG 담당자</p><p class="info-card-value">${i.mfg_pic}</p></div>
                            <div><p class="info-card-label">요청일시</p><p class="info-card-value text-red-500">${i.req_date} ${i.req_time}</p></div>
                        </div>
                        <div class="flex gap-3">
                            <select id="qmpic-${i.id}" class="flex-1 bg-violet-50 border-2 border-violet-100 p-4 rounded-2xl font-bold text-sm outline-none">
                                <option value="">QM 담당 선택</option>
                                <option value="김구원">김구원</option><option value="위대명">위대명</option><option value="박진주">박진주</option><option value="박현용">박현용</option>
                            </select>
                            <button onclick="respond('${i.id}')" class="bg-violet-700 text-white px-8 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all">확정</button>
                            <button onclick="toggleRejectArea('${i.id}')" class="bg-white border-2 border-red-100 text-red-500 px-6 rounded-2xl font-black text-sm">반려</button>
                        </div>
                        <div id="reject-area-${i.id}" class="reject-area">
                            <div class="pt-4 border-t border-dashed border-violet-200 mt-4">
                                <textarea id="reject-reason-${i.id}" class="w-full p-4 bg-red-50/50 border-2 border-red-100 rounded-xl text-sm h-24 outline-none" placeholder="반려 사유..."></textarea>
                                <button onclick="submitReject('${i.id}')" class="w-full bg-red-500 text-white py-4 rounded-xl text-sm font-black mt-3 shadow-md">반려 제출</button>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }
        function toggleRejectArea(id) { document.getElementById(`reject-area-${id}`).classList.toggle('open'); }
        async function submitReject(id) {
            const reason = document.getElementById(`reject-reason-${id}`).value.trim();
            if(!reason) return alert("사유 입력 필수");
            const res = await fetch('/api/respond', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: parseInt(id), status: '반려', reject_reason: reason }) });
            if(res.ok) { fetchData(); changeTab('list'); showToast("반려됨"); }
        }
        async function respond(id) {
            const pic = document.getElementById(`qmpic-${id}`).value;
            if(!pic) return alert("담당자 선택 필수");
            const res = await fetch('/api/respond', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: parseInt(id), qm_pic: pic, status: '확정' }) });
            if(res.ok) { fetchData(); showToast("확정됨"); }
        }
        async function deleteItem(id) { if(confirm("삭제?")) { await fetch(`/api/requests/${id}/delete`, { method: 'POST' }); fetchData(); } }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = "✅ " + m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
        function changeTab(n) { document.querySelectorAll('.tab-content, .nav-btn').forEach(e => e.classList.remove('active')); document.getElementById('tab-'+n).classList.add('active'); document.getElementById('btn-'+n).classList.add('active'); }
        function toggleMaster() { isMaster = !isMaster; document.getElementById('master-dot').style.left = isMaster ? '1.6rem' : '0.125rem'; document.getElementById('table-container').classList.toggle('master-active', isMaster); }
        window.onload = fetchData;
    </script>
</body>
</html>
