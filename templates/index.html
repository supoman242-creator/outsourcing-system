<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출하검사 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8faff; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-900 italic tracking-tight">출하검사 시스템</h1>
            <button onclick="location.href='/api/logout'" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700 transition">로그아웃</button>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow-xl mb-8 border border-slate-200">
            <div class="flex gap-4 mb-4">
                <button onclick="showTab('all')" id="btn-tab-all" class="px-6 py-2 rounded-xl font-bold bg-indigo-600 text-white shadow-md">전체 리스트</button>
                <button onclick="showTab('pending')" id="btn-tab-pending" class="px-6 py-2 rounded-xl font-bold bg-white text-slate-600 border hover:bg-slate-50 transition">QM 피드백 대기</button>
            </div>
            
            <textarea id="excel-input" rows="4" class="w-full p-4 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition mb-4 bg-slate-50" placeholder="엑셀 데이터를 복사해서 여기에 붙여넣으세요..."></textarea>
            
            <div class="flex justify-between items-center">
                <span id="detect-count" class="text-sm font-bold text-indigo-600 uppercase tracking-wider">0건 감지됨</span>
                <button onclick="syncData()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg transform active:scale-95 transition">리스트 등록</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider font-bold">
                            <th class="p-4 border-b">상태</th>
                            <th class="p-4 border-b">LOT</th>
                            <th class="p-4 border-b text-center">W/O</th>
                            <th class="p-4 border-b">고객사</th>
                            <th class="p-4 border-b">Model</th>
                            <th class="p-4 border-b">MFG</th>
                            <th class="p-4 border-b">요청일시</th>
                            <th class="p-4 border-b">QM담당/사유</th>
                            <th class="p-4 border-b text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody id="request-table" class="text-sm text-slate-700 divide-y">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let currentTab = 'all';

        window.onload = function() {
            fetchData();
            
            document.getElementById('excel-input').addEventListener('input', (e) => {
                const lines = e.target.value.trim().split('\n').filter(l => l.length > 0);
                document.getElementById('detect-count').innerText = `${lines.length}건 감지됨`;
            });
        };

        async function fetchData() {
            const res = await fetch('/api/requests');
            allData = await res.json();
            renderTable();
        }

        function renderTable() {
            const container = document.getElementById('request-table');
            let filtered = allData;
            
            if(currentTab === 'pending') {
                filtered = filtered.filter(d => d.status === '검사 요청');
            }

            container.innerHTML = filtered.map(item => `
                <tr class="hover:bg-indigo-50/50 transition cursor-default">
                    <td class="p-4">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${item.status === '검사 완료' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                            ${item.status}
                        </span>
                    </td>
                    <td class="p-4 font-semibold text-slate-900">${item.lot || '-'}</td>
                    <td class="p-4 text-xs text-slate-500 text-center">${item.wo || '-'}</td>
                    <td class="p-4">${item.cus || '-'}</td>
                    <td class="p-4 font-medium text-indigo-600">${item.model || '-'}</td>
                    <td class="p-4 font-medium">${item.mfg_pic || '-'}</td>
                    <td class="p-4 text-xs text-slate-500">${item.req_date} ${item.req_time}</td>
                    <td class="p-4 text-xs">
                        <span class="font-bold text-slate-900">${item.qm_pic || ''}</span>
                        ${item.reject_reason ? `<br><span class="text-red-500 font-medium">${item.reject_reason}</span>` : ''}
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="deleteItem(${item.id})" class="text-slate-300 hover:text-red-500 transition-colors p-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function syncData() {
            const input = document.getElementById('excel-input').value.trim();
            if(!input) return alert("등록할 데이터가 없습니다.");

            const rows = input.split('\n').map(line => {
                const cols = line.split(/\t| {2,}/);
                return {
                    lot: cols[0], code: cols[1], wo: cols[2], sn: cols[3],
                    cus: cols[4], line: cols[5], model: cols[6], module: cols[7],
                    tuning_loc: cols[8], tuning_bp: cols[9], mfg_pic: cols[10],
                    req_date: cols[11], req_time: cols[12]
                };
            });

            const res = await fetch('/api/requests/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(rows)
            });

            if(res.ok) {
                document.getElementById('excel-input').value = '';
                fetchData();
                alert("데이터가 성공적으로 등록되었습니다.");
            }
        }

        async function deleteItem(id) {
            if(!confirm("해당 데이터를 영구 삭제하시겠습니까?")) return;
            await fetch(`/api/requests/${id}/delete`, {method: 'POST'});
            fetchData();
        }

        function showTab(tab) {
            currentTab = tab;
            const btnAll = document.getElementById('btn-tab-all');
            const btnPending = document.getElementById('btn-tab-pending');
            
            if(tab === 'all') {
                btnAll.className = "px-6 py-2 rounded-xl font-bold bg-indigo-600 text-white shadow-md";
                btnPending.className = "px-6 py-2 rounded-xl font-bold bg-white text-slate-600 border hover:bg-slate-50 transition";
            } else {
                btnPending.className = "px-6 py-2 rounded-xl font-bold bg-indigo-600 text-white shadow-md";
                btnAll.className = "px-6 py-2 rounded-xl font-bold bg-white text-slate-600 border hover:bg-slate-50 transition";
            }
            renderTable();
        }
    </script>
</body>
</html>
