<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SHIPMENT SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { background-color: #4f46e5; color: white; border-bottom: 4px solid #818cf8; }
        th { white-space: nowrap; font-size: 11px; padding: 12px; background: #f1f5f9; border-bottom: 2px solid #e2e8f0; sticky; top: 0; }
        td { font-size: 12px; padding: 10px; border-bottom: 1px solid #f1f5f9; text-align: center; white-space: nowrap; }
        .filter-input { width: 100%; font-size: 10px; padding: 4px; border: 1px solid #e2e8f0; border-radius: 4px; }
        .master-only { display: none; }
        .master-active .master-only { display: table-cell; }
    </style>
</head>
<body class="p-6">
    <div id="toast" class="fixed top-5 right-5 hidden bg-slate-800 text-white px-6 py-3 rounded-xl shadow-xl font-bold z-50"></div>

    <div class="max-w-full mx-auto">
        <div class="flex justify-between items-center mb-8 pb-4 border-b">
            <h1 class="text-3xl font-black text-slate-900 italic">SHIPMENT SYSTEM</h1>
            <div class="flex items-center gap-4">
                <div id="master-switch-wrapper" style="display:none;">
                    <button onclick="toggleMaster()" class="bg-white border-2 px-4 py-2 rounded-xl text-[10px] font-black text-slate-400">Master Mode</button>
                </div>
                <a href="/api/logout" class="bg-rose-500 text-white px-4 py-2 rounded-xl text-xs font-bold">로그아웃</a>
            </div>
        </div>

        <div class="flex space-x-2 mb-6">
            <button onclick="changeTab('list')" id="btn-list" class="nav-btn active px-8 py-3 rounded-xl text-sm font-black shadow-sm bg-white">검사 리스트</button>
            <button onclick="changeTab('qm')" id="btn-qm" class="nav-btn px-8 py-3 rounded-xl text-sm font-black text-slate-600 bg-white shadow-sm relative">
                QM 피드백 <span id="qm-badge" class="absolute -top-1 -right-1 bg-red-500 text-white px-2 py-0.5 rounded-full text-[10px] hidden">0</span>
            </button>
        </div>

        <div id="tab-list" class="tab-content active">
            <div id="excel-input-area" class="hidden mb-6 bg-white p-4 rounded-2xl border-2 border-dashed border-slate-200">
                <textarea id="excel-paste" class="w-full h-24 p-3 text-xs outline-none resize-none" placeholder="엑셀 데이터를 붙여넣으세요..."></textarea>
                <div id="preview-area" class="hidden mt-3 flex justify-between items-center">
                    <span class="text-xs font-bold text-indigo-600"><span id="item-count">0</span>개 항목 감지됨</span>
                    <button onclick="submitSync()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-black text-xs">DB 저장하기</button>
                </div>
            </div>
            
            <div class="bg-white border-2 border-slate-200 rounded-2xl shadow-sm overflow-hidden" id="table-container">
                <div class="overflow-x-auto max-h-[600px]">
                    <table class="w-full">
                        <thead>
                            <tr class="bg-slate-50">
                                <th>상태</th><th>LOT</th><th>W/O</th><th>S/N</th><th>고객사</th><th>Line</th>
                                <th>Model</th><th>Module</th><th>MFG</th><th>요청일시</th><th>QM/사유</th><th class="master-only">액션</th>
                            </tr>
                            <tr class="bg-white">
                                <th></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()"></th>
                                <th><input type="text" class="filter-input" onkeyup="filterTable()"></th>
                                <th class="master-only"></th>
                            </tr>
                        </thead>
                        <tbody id="list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-qm" class="tab-content">
            <div id="qm-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <script>
        let allData = [];
        let currentUser = "";

        async function init() {
            const res = await fetch('/api/user');
            const userData = await res.json();
            currentUser = userData.username;

            if(currentUser === 'pskhmfg') {
                document.getElementById('master-switch-wrapper').style.display = 'block';
                document.getElementById('excel-input-area').style.display = 'block';
            }
            loadData();
        }

        async function loadData() {
            const res = await fetch('/api/requests');
            allData = await res.json();
            renderTable();
            renderQM();
        }

        function renderTable() {
            const listBody = document.getElementById('list-body');
            listBody.innerHTML = allData.map(i => {
                const sColor = i.status === '확정' ? 'bg-green-100 text-green-700' : 
                               i.status === '반려' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700';
                
                const qmInfo = (i.status === '반려' && i.reject_reason) 
                               ? `${i.qm_pic||'-'} <span class="text-[10px] text-red-500 font-bold ml-1">[사유: ${i.reject_reason}]</span>` 
                               : (i.qm_pic || '-');

                return `
                <tr>
                    <td><span class="px-2 py-1 rounded font-black text-[10px] ${sColor}">${i.status}</span></td>
                    <td class="font-bold">${i.lot}</td>
                    <td>${i.wo}</td>
                    <td class="text-indigo-600 font-black">${i.sn}</td>
                    <td>${i.cus}</td>
                    <td>${i.line}</td>
                    <td class="font-black text-left">${i.model}</td>
                    <td class="font-bold text-indigo-600">${i.module}</td>
                    <td>${i.mfg_pic}</td>
                    <td class="text-slate-400 text-[10px]">${i.req_date} ${i.req_time}</td>
                    <td class="font-black text-[11px]">${qmInfo}</td>
                    <td class="master-only"><button onclick="deleteItem(${i.id})" class="text-red-400 font-bold">삭제</button></td>
                </tr>`;
            }).join('');
        }

        function renderQM() {
            const qmWait = allData.filter(i => i.status === '검사 요청');
            document.getElementById('qm-badge').innerText = qmWait.length;
            document.getElementById('qm-badge').classList.toggle('hidden', qmWait.length === 0);
            
            const container = document.getElementById('qm-container');
            if(qmWait.length === 0) { container.innerHTML = `<div class="col-span-full py-20 text-center text-slate-300 font-bold">대기 중인 피드백이 없습니다.</div>`; return; }
            
            container.innerHTML = qmWait.map(i => `
                <div class="bg-white border-2 border-slate-100 rounded-3xl p-5 shadow-sm">
                    <h3 class="text-lg font-black text-slate-800 mb-2">${i.model}</h3>
                    <p class="text-xs text-indigo-500 font-bold mb-4">SN: ${i.sn}</p>
                    <div class="flex gap-2 mb-3">
                        <select id="qmpic-${i.id}" class="flex-1 bg-slate-50 border p-2 rounded-xl text-xs font-bold">
                            <option value="">담당자</option><option value="김구원">김구원</option><option value="위대명">위대명</option><option value="박진주">박진주</option>
                        </select>
                        <button onclick="respond('${i.id}', '확정')" class="bg-slate-900 text-white px-4 rounded-xl font-black text-xs">확정</button>
                    </div>
                    <div class="flex gap-2">
                        <input id="rej-msg-${i.id}" class="flex-1 p-2 bg-rose-50 border border-rose-100 rounded-xl text-xs" placeholder="반려 사유">
                        <button onclick="respond('${i.id}', '반려')" class="bg-rose-500 text-white px-4 rounded-xl font-black text-xs">반려</button>
                    </div>
                </div>`).join('');
        }

        async function respond(id, status) {
            const pic = document.getElementById(`qmpic-${id}`).value;
            const reason = document.getElementById(`rej-msg-${id}`).value;
            await fetch('/api/respond', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: parseInt(id), qm_pic: pic, status: status, reject_reason: reason })
            });
            loadData(); changeTab('list'); showToast(`${status} 처리 완료`);
        }

        function filterTable() {
            const rows = document.getElementById("list-body").rows;
            const filters = document.querySelectorAll('.filter-input');
            for (let i = 0; i < rows.length; i++) {
                let show = true;
                filters.forEach((input, idx) => {
                    const val = input.value.toLowerCase();
                    if (val && !rows[i].cells[idx + 1].innerText.toLowerCase().includes(val)) show = false;
                });
                rows[i].style.display = show ? "" : "none";
            }
        }

        document.getElementById('excel-paste').addEventListener('input', function() {
            const lines = this.value.trim().split('\n');
            const data = lines.map(line => {
                const c = line.split('\t');
                if (c.length < 13) return null;
                return { lot: c[0], wo: c[2], sn: c[3], cus: c[4], line: c[5], model: c[6], module: c[7], mfg_pic: c[10], req_date: c[11], req_time: c[12] };
            }).filter(i => i && !i.lot.includes("LOT"));
            window.tempData = data;
            document.getElementById('item-count').innerText = data.length;
            document.getElementById('preview-area').classList.toggle('hidden', data.length === 0);
        });

        async function submitSync() {
            await fetch('/api/requests/sync', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(window.tempData) });
            document.getElementById('excel-paste').value = ''; loadData(); showToast("저장 완료");
        }

        async function deleteItem(id) { if(confirm("삭제?")) { await fetch(`/api/requests/${id}/delete`, {method: 'POST'}); loadData(); } }
        function changeTab(n) { document.querySelectorAll('.tab-content, .nav-btn').forEach(e => e.classList.remove('active')); document.getElementById('tab-'+n).classList.add('active'); document.getElementById('btn-'+n).classList.add('active'); }
        function toggleMaster() { document.getElementById('table-container').classList.toggle('master-active'); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
        window.onload = init;
    </script>
</body>
</html>
