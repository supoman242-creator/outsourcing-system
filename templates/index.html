<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출하검사 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4ff; }
        .search-input { width: 100%; padding: 4px 8px; font-size: 11px; border: 1px solid #e2e8f0; border-radius: 6px; outline: none; transition: all 0.2s; }
        .search-input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-[1600px] mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-black text-indigo-900 italic tracking-tighter">출하검사 시스템</h1>
            <div class="flex items-center gap-4">
                <button onclick="location.href='/api/logout'" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-700 transition">로그아웃</button>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-6 shadow-xl mb-6 border border-white">
            <div class="flex gap-2 mb-4">
                <button onclick="changeTab('all')" id="tab-all" class="px-8 py-2.5 rounded-xl font-black text-sm bg-indigo-600 text-white shadow-lg">전체 리스트</button>
                <button onclick="changeTab('pending')" id="tab-pending" class="px-8 py-2.5 rounded-xl font-black text-sm bg-white text-slate-500 border border-slate-100 hover:bg-slate-50 transition">QM 피드백 대기</button>
            </div>
            
            <textarea id="excel-input" class="w-full h-32 p-5 border-2 border-dashed border-indigo-100 rounded-2xl focus:border-indigo-400 outline-none transition mb-4 bg-indigo-50/20 text-xs" placeholder="엑셀 데이터를 이곳에 붙여넣으세요..."></textarea>
            
            <div class="flex justify-between items-center px-2">
                <span id="detect-status" class="text-xs font-black text-indigo-500 italic">0건 감지됨</span>
                <button onclick="syncData()" class="bg-indigo-600 text-white px-10 py-3 rounded-xl font-black text-sm hover:bg-indigo-700 shadow-lg active:scale-95 transition">리스트 등록</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-2xl overflow-hidden border border-slate-100">
            <div class="overflow-x-auto">
                <table class="w-full text-[11px] text-left whitespace-nowrap">
                    <thead class="bg-slate-50 text-slate-500 font-bold border-b border-slate-100">
                        <tr class="uppercase">
                            <th class="p-3">상태</th>
                            <th class="p-3">LOT</th>
                            <th class="p-3">W/O</th>
                            <th class="p-3">S/N</th>
                            <th class="p-3">고객사</th>
                            <th class="p-3">LINE</th>
                            <th class="p-3">MODEL</th>
                            <th class="p-3">MODULE</th>
                            <th class="p-3">TUNING 장소</th>
                            <th class="p-3">TUNING B.P</th>
                            <th class="p-3 text-center">MFG</th>
                            <th class="p-3">요청일시</th>
                            <th class="p-3">QM담당/사유</th>
                        </tr>
                        <tr class="bg-indigo-50/30">
                            <td class="p-2"></td>
                            <td class="p-2"><input type="text" class="search-input" onkeyup="filterTable()" placeholder="검색"></td>
                            <td class="p-2"><input type="text" class="search-input" onkeyup="filterTable()" placeholder="검색"></td>
                            <td class="p-2"><input type="text" class="search-input" onkeyup="filterTable()" placeholder="검색"></td>
                            <td class="p-2"><input type="text" class="search-input" onkeyup="filterTable()" placeholder="검색"></td>
                            <td class="p-2"><input type="text" class="search-input" onkeyup="filterTable()" placeholder="검색"></td>
                            <td class="p-2"><input type="text" class="search-input" onkeyup="filterTable()" placeholder="검색"></td>
                            <td class="p-2"><input type="text" class="search-input" onkeyup="filterTable()" placeholder="검색"></td>
                            <td class="p-2"><input type="text" class="search-input" onkeyup="filterTable()" placeholder="검색"></td>
                            <td class="p-2"><input type="text" class="search-input" onkeyup="filterTable()" placeholder="검색"></td>
                            <td class="p-2"><input type="text" class="search-input" onkeyup="filterTable()" placeholder="검색"></td>
                            <td class="p-2"><input type="text" class="search-input" onkeyup="filterTable()" placeholder="검색"></td>
                            <td class="p-2"><input type="text" class="search-input" onkeyup="filterTable()" placeholder="검색"></td>
                        </tr>
                    </thead>
                    <tbody id="main-table" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let fullData = [];
        let currentTab = 'all';

        // 페이지 시작 시 실행 (로컬에서 사용하던 방식 그대로)
        window.onload = function() {
            fetchList();
            document.getElementById('excel-input').addEventListener('input', (e) => {
                const count = e.target.value.trim().split('\n').filter(l => l.length > 0).length;
                document.getElementById('detect-status').innerText = `${count}건 감지됨`;
            });
        };

        async function fetchList() {
            const res = await fetch('/api/requests');
            fullData = await res.json();
            renderTable();
        }

        function renderTable() {
            const container = document.getElementById('main-table');
            let data = fullData;

            // 탭 필터링 로직
            if(currentTab === 'pending') {
                data = data.filter(d => d.status === '검사 요청');
            }

            container.innerHTML = data.map(item => `
                <tr class="hover:bg-indigo-50/30 transition text-slate-600">
                    <td class="p-3"><span class="px-2 py-0.5 rounded text-[10px] font-black ${item.status === '검사 완료' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${item.status}</span></td>
                    <td class="p-3 font-bold text-slate-900">${item.lot || '-'}</td>
                    <td class="p-3 text-[10px] text-slate-400">${item.wo || '-'}</td>
                    <td class="p-3 font-medium">${item.sn || '-'}</td>
                    <td class="p-3 font-medium">${item.cus || '-'}</td>
                    <td class="p-3">${item.line || '-'}</td>
                    <td class="p-3 font-black text-indigo-600">${item.model || '-'}</td>
                    <td class="p-3">${item.module || '-'}</td>
                    <td class="p-3">${item.tuning_loc || '-'}</td>
                    <td class="p-3">${item.tuning_bp || '-'}</td>
                    <td class="p-3 text-center font-bold text-slate-900">${item.mfg_pic || '-'}</td>
                    <td class="p-3 text-[10px] text-slate-400">${item.req_date} ${item.req_time}</td>
                    <td class="p-3 text-slate-900 font-bold">${item.qm_pic || ''} <span class="text-red-500 font-medium ml-1">${item.reject_reason || ''}</span></td>
                </tr>
            `).join('');
        }

        // 로컬 PC에서 가장 잘 되던 실시간 검색 로직
        function filterTable() {
            const inputs = document.querySelectorAll('.search-input');
            const rows = document.querySelectorAll('#main-table tr');
            
            rows.forEach(row => {
                let show = true;
                inputs.forEach((input, index) => {
                    const cellText = row.cells[index + 1].innerText.toLowerCase();
                    if (input.value && !cellText.includes(input.value.toLowerCase())) {
                        show = false;
                    }
                });
                row.style.display = show ? '' : 'none';
            });
        }

        async function syncData() {
            const val = document.getElementById('excel-input').value.trim();
            if(!val) return;
            
            // 엑셀 탭(Tab) 구분 로직
            const rows = val.split('\n').map(l => {
                const c = l.split(/\t| {2,}/);
                return { 
                    lot:c[0], code:c[1], wo:c[2], sn:c[3], cus:c[4], line:c[5], 
                    model:c[6], module:c[7], tuning_loc:c[8], tuning_bp:c[9], 
                    mfg_pic:c[10], req_date:c[11], req_time:c[12] 
                };
            });

            const res = await fetch('/api/requests/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(rows)
            });

            if(res.ok) {
                document.getElementById('excel-input').value = '';
                fetchList();
                alert("성공적으로 등록되었습니다.");
            }
        }

        function changeTab(t) {
            currentTab = t;
            document.getElementById('tab-all').className = t === 'all' ? "px-8 py-2.5 rounded-xl font-black text-sm bg-indigo-600 text-white shadow-lg" : "px-8 py-2.5 rounded-xl font-black text-sm bg-white text-slate-500 border border-slate-100";
            document.getElementById('tab-pending').className = t === 'pending' ? "px-8 py-2.5 rounded-xl font-black text-sm bg-indigo-600 text-white shadow-lg" : "px-8 py-2.5 rounded-xl font-black text-sm bg-white text-slate-500 border border-slate-100";
            renderTable();
        }
    </script>
</body>
</html>
